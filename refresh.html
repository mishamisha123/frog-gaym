<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#10283a">
  <title>Updating Froggy Leap</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100svh;display:grid;place-items:center;padding:24px;background:linear-gradient(145deg,#bdf7ed,#dff5b7);font-family:system-ui,-apple-system,sans-serif;color:#10283a}
    main{width:min(420px,100%);padding:28px;border-radius:28px;background:rgba(255,255,249,.94);box-shadow:0 24px 70px rgba(5,52,65,.22);text-align:center}
    .frog{font-size:68px;animation:bob .8s ease-in-out infinite alternate}
    h1{margin:8px 0;font-size:28px}
    p{margin:0;color:#526b79;line-height:1.5}
    .bar{height:12px;margin:22px 0 10px;border-radius:999px;background:#dce7d7;overflow:hidden}
    .bar i{display:block;height:100%;width:10%;border-radius:inherit;background:linear-gradient(90deg,#73d75a,#d9ff64);animation:load 1.25s ease-in-out infinite}
    small{font-weight:900;color:#238246}
    @keyframes load{50%{width:88%}100%{width:100%}}
    @keyframes bob{to{transform:translateY(-8px) rotate(2deg)}}
  </style>
</head>
<body>
  <main>
    <div class="frog">🐸</div>
    <h1>Updating Froggy Leap</h1>
    <p>Removing the old offline cache and loading the consolidated game.</p>
    <div class="bar"><i></i></div>
    <small id="status">Preparing v16…</small>
  </main>
  <script>
    (async () => {
      const status = document.getElementById('status');
      try {
        status.textContent = 'Removing old service workers…';
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(registration => registration.unregister()));
        }
        status.textContent = 'Clearing old game files…';
        if ('caches' in window) {
          const names = await caches.keys();
          await Promise.all(names.map(name => caches.delete(name)));
        }
        status.textContent = 'Loading v16…';
      } catch (error) {
        console.warn('Refresh helper:', error);
        status.textContent = 'Reloading the game…';
      }
      // localStorage is intentionally untouched, so balance and progress remain.
      setTimeout(() => location.replace('./?build=v16-' + Date.now()), 650);
    })();
  </script>
</body>
</html>
